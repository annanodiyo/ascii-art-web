<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ASCII Art Web</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }

        h1 {
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 100px;
            margin-bottom: 10px;
        }

        select, button {
            padding: 10px;
            margin-top: 10px;
        }

        .error {
            color: red;
            font-weight: bold;
        }

        pre {
            background: black;
            color: lime;
            padding: 15px;
            overflow-x: auto;
        }

        .section {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>ASCII Art Generator</h1>

    <!-- FORM -->
    <form action="/ascii" method="POST">

        <!-- TEXT INPUT -->
        <label>Enter Text:</label>
        <textarea name="text" placeholder="Type your text here..."></textarea>

        <!-- BANNER SELECTION -->
        <div class="section">
            <label>Select Banner:</label><br>

            <input type="radio" name="banner" value="standard"> Standard<br>
            <input type="radio" name="banner" value="shadow"> Shadow<br>
            <input type="radio" name="banner" value="thinkertoy"> Thinkertoy<br>

            <!-- IMPORTANT FEATURE -->
            <input type="radio" name="banner" value="all">
            <strong>Test All Banners</strong>
        </div>

        <!-- SUBMIT BUTTON -->
        <button type="submit">Generate ASCII</button>
    </form>

    <!-- ERROR DISPLAY -->
    {{if .Error}}
        <div class="section error">
            Error: {{.Error}}
        </div>
    {{end}}

    <!-- RESULT DISPLAY -->
    {{if .Result}}
        <div class="section">
            <h2>Result:</h2>
            <pre>{{.Result}}</pre>
        </div>
    {{end}}

</div>

</body>
</html>
