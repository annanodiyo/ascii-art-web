<!DOCTYPE html>
<html>
<head>
    <title>ASCII Art</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }
        textarea {
            width: 300px;
            height: 100px;
        }
        button {
            margin-top: 10px;
            padding: 10px 20px;
        }
    </style>
</head>
<body>

<h1>ASCII Art Generator</h1>

<form action="/ascii-art" method="POST">
    <textarea name="text" placeholder="Enter text"></textarea><br><br>

    <label>
        <input type="radio" name="banner" value="standard" checked>
        Standard
    </label>

    <label>
        <input type="radio" name="banner" value="shadow">
        Shadow
    </label>

    <label>
        <input type="radio" name="banner" value="thinkertoy">
        Thinkertoy
    </label>

    <br><br>

    <button type="submit">Generate</button>
</form>

</body>
</html>
