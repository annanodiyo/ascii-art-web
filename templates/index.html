<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ASCII Art Generator</title>

    <style>
        body {
            font-family: Arial;
            background: #030320;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: rgb(107, 120, 243);
            padding: 20px;
            border-radius: 8px;
        }

        textarea {
            width: 100%;
            height: 100px;
        }

        button {
            padding: 10px;
            margin-top: 10px;
        }

        .error {
            color: red;
        }

        pre {
    font-family: "Courier New", monospace;
    font-size: 12px;
    line-height: 1.2;

    background: white;  
    color: black;      

    padding: 15px;
    border-radius: 8px;
    overflow-x: auto;
    white-space: pre;
}
    </style>
</head>

<body>

<div class="container">

    <h1>ASCII Art Generator</h1>

    <form action="/ascii" method="POST">

        <label>Enter Text:</label><br>
        <textarea name="text" required>{{.Text}}</textarea><br>

        <!-- <p>{{.Text}}</p> -->

        <label>Select Banner:</label><br>

        <input type="radio" name="banner" value="standard" checked> Standard<br>
        <input type="radio" name="banner" value="shadow"> Shadow<br>
        <input type="radio" name="banner" value="thinkertoy"> Thinkertoy<br>

        
        <input type="radio" name="banner" value="all">
        <strong>Test All Banners</strong><br>

        <button type="submit">Generate ASCII</button>
    </form>

    <!-- ERROR -->
    {{if .Error}}
        <p class="error">Error: {{.Error}}</p>
    {{end}}

    <!-- RESULT -->
    {{if .Result}}
        <h2>Result:</h2>
        <pre>{{.Result}}</pre>
    {{end}}

</div>

</body>
</html>
